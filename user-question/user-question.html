<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の質問 | VOZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="user-question.css">
</head>
<body>

  <header class="header">
    <span class="header-logo">VOZ</span>
    <div class="header-actions">
      <button class="icon-btn" id="btn-notif" aria-label="アナウンス">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="notif-dot" id="notif-dot"></span>
      </button>
      <button class="burger-btn" id="burger-btn" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="drawer" id="drawer">
    <ul class="drawer-nav">
      <li><a href="../user-home/user-home.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
        ホーム
      </a></li>
      <li class="drawer-divider"></li>
      <li><a href="../user-lesson/user-lesson.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h11"/></svg>
        レッスン
      </a></li>
      <li><a href="../user-question/user-question.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        今日の質問
      </a></li>
      <li><a href="../user-flashcard/user-flashcard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        語彙(フラッシュカード)
      </a></li>
      <li><a href="../user-dictionary/user-dictionary.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        辞書・活用表
      </a></li>
      <li><a href="../user-announce/user-announce.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        アナウンス
      </a></li>
    </ul>
    <button class="logout-btn" id="logout-btn">ログアウト</button>
  </nav>

  <main class="main">

    <!-- ① 質問一覧 -->
    <section class="view-list" id="view-list">
      <div class="filter-bar">
        <div class="filter-top">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="search-input" placeholder="キーワードで検索" />
          <button class="filter-toggle-btn" id="filter-toggle-btn">▲</button>
        </div>
        <div class="filter-body" id="filter-body">
          <div class="filter-row">
            <label>カテゴリ</label>
            <select id="filter-category">
              <option value="">すべて</option>
            </select>
          </div>
        </div>
      </div>

      <ul class="question-list" id="question-list"></ul>
      <p class="empty-msg" id="empty-msg">質問がまだありません</p>
    </section>

    <!-- ② 質問詳細(答え合わせ)画面 -->
    <section class="view-detail" id="view-detail">
      <div class="detail-top">
        <button class="detail-exit" id="btn-exit-detail">✕</button>
      </div>
      <div class="detail-body">

        <div class="detail-meta" id="detail-meta"></div>

        <div class="preview-wrap" id="preview-wrap"></div>
        <div id="preview-bubble" class="preview-meaning-bubble" style="display:none"></div>

        <!-- 自分の回答 -->
        <div class="own-answer-section">
          <label class="own-answer-label">あなたの回答</label>
          <textarea class="own-answer-input" id="own-answer-input" rows="4" placeholder="スペイン語で書いてみましょう"></textarea>
        </div>

        <!-- 日本語訳(答え合わせ) -->
        <div class="reveal-section">
          <button class="reveal-toggle" id="toggle-japanese">日本語訳を見る ▼</button>
          <div class="reveal-body" id="body-japanese">
            <div class="detail-japanese" id="detail-japanese"></div>
          </div>
        </div>

        <!-- 語彙 -->
        <div class="reveal-section" id="section-vocab" style="display:none">
          <button class="reveal-toggle" id="toggle-vocab">語彙を見る ▼</button>
          <div class="reveal-body" id="body-vocab"></div>
        </div>

        <!-- 文法ポイント -->
        <div class="reveal-section" id="section-grammar" style="display:none">
          <button class="reveal-toggle" id="toggle-grammar">文法ポイントを見る ▼</button>
          <div class="reveal-body" id="body-grammar"></div>
        </div>

        <!-- ヒント -->
        <div class="reveal-section" id="section-hints" style="display:none">
          <button class="reveal-toggle" id="toggle-hints">💡 ヒントを見る ▼</button>
          <div class="reveal-body" id="body-hints"></div>
        </div>

        <!-- 回答例 -->
        <div class="reveal-section" id="section-answers" style="display:none">
          <button class="reveal-toggle" id="toggle-answers">回答例を見る ▼</button>
          <div class="reveal-body" id="body-answers"></div>
        </div>

      </div>
    </section>

  </main>

  <nav class="footer-nav">
    <a class="nav-btn" href="../user-home/user-home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
      <span>ホーム</span>
    </a>
    <a class="nav-btn" href="../user-lesson/user-lesson.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h11"/></svg>
      <span>レッスン</span>
    </a>
    <a class="nav-btn active" href="../user-question/user-question.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span>質問</span>
    </a>
    <a class="nav-btn" href="../user-flashcard/user-flashcard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>語彙</span>
    </a>
    <a class="nav-btn" href="../user-dictionary/user-dictionary.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <span>検索</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="user-question.js"></script>
</body>
</html>
