<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="user-lesson.css">
</head>
<body>

  <header class="header">
    <span class="header-logo">VOZ</span>

      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="drawer" id="drawer">
    <ul class="drawer-nav">
      <li><a href="../user-home/user-home.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
        ホーム
      </a></li>

      <li><a href="../user-lesson/user-lesson.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h11"/></svg>
        レッスン
      </a></li>
      <li><a href="../user-question/user-question.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        今日の質問
      </a></li>
      <li><a href="../user-flashcard/user-flashcard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        語彙(フラッシュカード)
      </a></li>
      <li><a href="../user-dictionary/user-dictionary.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        辞書・活用表
      </a></li>
      <li><a href="../user-announce/user-announce.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        アナウンス
      </a></li>
    </ul>
    <button class="logout-btn" id="logout-btn">ログアウト</button>
  </nav>

  <main class="main">

    <div class="filter-bar">
      <div class="filter-top">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="タイトルで検索" />
      </div>
    </div>

    <!-- 学習中 -->
    <div class="list-section" id="section-progress">
      <div class="list-section-label">学習中</div>
      <ul class="plan-list" id="list-progress"></ul>
      <p class="empty-sub" id="empty-progress" style="display:none">学習中のレッスンプランはありません</p>
    </div>

    <!-- 未着手 -->
    <div class="list-section" id="section-new">
      <div class="list-section-label">未着手</div>
      <ul class="plan-list" id="list-new"></ul>
      <p class="empty-sub" id="empty-new" style="display:none">未着手のレッスンプランはありません</p>
    </div>

    <!-- 完了 -->
    <div class="list-section" id="section-done">
      <div class="list-section-label">完了</div>
      <ul class="plan-list" id="list-done"></ul>
      <p class="empty-sub" id="empty-done" style="display:none">完了したレッスンプランはありません</p>
    </div>

  </main>

  <nav class="footer-nav">
    <a class="nav-btn" href="../user-home/user-home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h11"/></svg>
      <span>レッスン</span>
    </a>
    <a class="nav-btn" href="../user-question/user-question.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span>質問</span>
    </a>
    <a class="nav-btn" href="../user-flashcard/user-flashcard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>語彙</span>
    </a>
    <a class="nav-btn" href="../user-dictionary/user-dictionary.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <span>検索</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="user-lesson.js"></script>
</body>
</html>
