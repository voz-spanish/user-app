<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>語彙(フラッシュカード) | VOZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="user-flashcard.css">
</head>
<body>

  <header class="header">
    <span class="header-logo">VOZ</span>
    <div class="header-actions">
      <button class="icon-btn" id="btn-notif" aria-label="アナウンス">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="notif-dot" id="notif-dot"></span>
      </button>
      <button class="burger-btn" id="burger-btn" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="drawer" id="drawer">
    <ul class="drawer-nav">
      <li><a href="../user-home/user-home.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
        ホーム
      </a></li>
      <li class="drawer-divider"></li>
      <li><a href="../user-lesson/user-lesson.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h11"/></svg>
        レッスン
      </a></li>
      <li><a href="../user-question/user-question.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        今日の質問
      </a></li>
      <li><a href="../user-flashcard/user-flashcard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        語彙(フラッシュカード)
      </a></li>
      <li><a href="../user-dictionary/user-dictionary.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        辞書・活用表
      </a></li>
      <li><a href="../user-announce/user-announce.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        アナウンス
      </a></li>
    </ul>
    <button class="logout-btn" id="logout-btn">ログアウト</button>
  </nav>

  <main class="main">

    <!-- ① カテゴリ・セット一覧 -->
    <section class="view-list" id="view-list">
      <p class="list-intro">好きなカテゴリを選んでトレーニングしよう。1セット終えるごとに、その分野の語彙が身についていきます。</p>
      <div id="category-groups"></div>
      <p class="empty-msg" id="empty-msg">フラッシュカードがまだありません</p>
    </section>

    <!-- ② トレーニング画面 -->
    <section class="view-training" id="view-training">
      <div class="training-top">
        <button class="training-exit" id="btn-exit-training">✕</button>
        <span class="training-progress" id="training-progress"></span>
      </div>
      <p class="training-set-name" id="training-set-name"></p>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

      <div class="flip-card" id="flip-card">
        <div class="flip-card-inner" id="flip-card-inner">
          <div class="flip-front" id="flip-front"></div>
          <div class="flip-back" id="flip-back"></div>
        </div>
      </div>
      <p class="training-hint-tap" id="training-hint-tap">タップして意味を見る</p>

      <div class="training-actions" id="training-actions">
        <button class="btn-retry" id="btn-retry">もう一度</button>
        <button class="btn-known" id="btn-known">覚えた</button>
      </div>
    </section>

    <!-- ③ 完了画面 -->
    <section class="view-complete" id="view-complete">
      <p class="complete-title">よくできました</p>
      <p class="complete-sub" id="complete-sub"></p>
      <div class="complete-actions">
        <button class="btn-complete btn-complete--outline" id="btn-complete-retry">もう一度</button>
        <button class="btn-complete btn-complete--accent" id="btn-complete-back">一覧に戻る</button>
      </div>
    </section>

  </main>

  <nav class="footer-nav">
    <a class="nav-btn" href="../user-home/user-home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
      <span>ホーム</span>
    </a>
    <a class="nav-btn" href="../user-lesson/user-lesson.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h11"/></svg>
      <span>レッスン</span>
    </a>
    <a class="nav-btn" href="../user-question/user-question.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span>質問</span>
    </a>
    <a class="nav-btn active" href="../user-flashcard/user-flashcard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>語彙</span>
    </a>
    <a class="nav-btn" href="../user-dictionary/user-dictionary.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <span>検索</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="user-flashcard.js"></script>
</body>
</html>
