<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="user-login.css">
</head>
<body>
  <main class="login-wrap">
    <div class="login-card">

      <div class="login-header">
        <p class="label">SIGN UP</p>
        <h1>はじめまして</h1>
        <p class="lead">メールアドレスとパスワードを登録して、無料で利用を始められます。</p>
      </div>

      <div class="login-form">
        <div class="field">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" placeholder="example@mail.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="password">パスワード（8文字以上）</label>
          <div class="password-field">
            <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
            <button type="button" class="password-toggle" id="password-toggle" aria-label="パスワードを表示">👁</button>
          </div>
        </div>
        <div class="field">
          <label for="password-confirm">パスワード（確認）</label>
          <div class="password-field">
            <input type="password" id="password-confirm" placeholder="••••••••" autocomplete="new-password">
            <button type="button" class="password-toggle" id="password-confirm-toggle" aria-label="パスワードを表示">👁</button>
          </div>
        </div>

        <p class="msg" id="msg"></p>
        <div class="msg-links" id="msg-links" style="display:none">
          <a href="user-login.html" id="link-login" style="display:none">ログインはこちら</a>
        </div>

        <button id="signup-btn">登録する</button>
      </div>

      <div class="auth-footer">
        アカウントをお持ちの方は <a href="user-login.html">ログイン</a>
      </div>

    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="user-signup.js"></script>
</body>
</html>
