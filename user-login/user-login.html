<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="user-login.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="c-icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="c-icon-512.png">
  <meta name="theme-color" content="#5C3D2E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="VOZ">
</head>
<body>
  <main class="login-wrap">
    <div class="login-card">

      <div class="login-header">
        <p class="label">MEMBERS</p>
        <h1>おかえりなさい</h1>
      </div>

      <div class="login-form">
        <div class="field">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" placeholder="example@mail.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="password">パスワード</label>
          <div class="password-field">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="password-toggle" id="password-toggle" aria-label="パスワードを表示">👁</button>
          </div>
        </div>

        <p class="msg" id="msg"></p>
        <div class="msg-links" id="msg-links" style="display:none">
          <a href="user-reset-request.html" id="link-reset" style="display:none">パスワードをお忘れの方はこちら</a>
          <a href="user-signup.html" id="link-signup" style="display:none">新規登録はこちら</a>
        </div>

        <button id="login-btn">ログイン</button>
      </div>

      <div class="auth-footer">
        はじめてご利用の方は <a href="user-signup.html">新規登録</a>
      </div>

    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="user-login.js"></script>
</body>
</html>
